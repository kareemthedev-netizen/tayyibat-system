<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قاعدة الأطعمة | نظام الطيبات</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
</head>
<body>

<div class="foods-container">
    <div class="foods-header">
        <h1>🥗 قاعدة الأطعمة - نظام الطيبات</h1>
        <div class="foods-search">
            <input type="text" id="searchInput" placeholder="🔍 ابحث عن طعام...">
            <select id="filterSelect">
                <option value="all">الكل</option>
                <option value="allowed">✅ مسموح</option>
                <option value="forbidden">❌ ممنوع</option>
                <option value="limited">⚠️ محدود</option>
            </select>
        </div>
    </div>
    <div id="foodsGrid" class="foods-grid">جاري التحميل...</div>
</div>

<script>
    const db = firebase.firestore();
    const foodsGrid = document.getElementById('foodsGrid');
    const searchInput = document.getElementById('searchInput');
    const filterSelect = document.getElementById('filterSelect');

    let allFoods = [];

    async function loadFoods() {
        foodsGrid.innerHTML = '<div class="loading">⏳ جاري تحميل الأطعمة...</div>';
        try {
            const snapshot = await db.collection('foods').orderBy('name').get();
            allFoods = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            displayFoods();
        } catch (error) {
            foodsGrid.innerHTML = `<div class="error">❌ خطأ في تحميل البيانات: ${error.message}</div>`;
        }
    }

    function displayFoods() {
        let filtered = [...allFoods];
        const searchTerm = searchInput.value.toLowerCase();
        const filterType = filterSelect.value;

        if (filterType !== 'all') {
            filtered = filtered.filter(f => f.type === filterType);
        }
        if (searchTerm) {
            filtered = filtered.filter(f => f.name.includes(searchTerm) || f.category.includes(searchTerm));
        }

        if (filtered.length === 0) {
            foodsGrid.innerHTML = '<div class="no-results">❌ لا توجد أطعمة مطابقة للبحث</div>';
            return;
        }

        foodsGrid.innerHTML = filtered.map(food => `
            <div class="food-card">
                <div class="food-card-header">
                    <h3>${food.name}</h3>
                    <small class="food-category">${food.category}</small>
                </div>
                <div class="food-card-image">
                    <img src="${food.imageUrl || 'images/placeholder.jpg'}" alt="${food.name}">
                </div>
                <div class="food-card-body">
                    <p><strong>📝 الوصف:</strong> ${food.desc}</p>
                    <p style="color: #a8e6cf;"><strong>🌟 الفوائد:</strong> ${food.benefits}</p>
                    <p style="color: #ffab91;"><strong>⚠️ تحذير:</strong> ${food.warning}</p>
                    <p><strong>📊 الكمية:</strong> ${food.quantity}</p>
                </div>
                <div class="food-card-footer ${food.type}">
                    ${food.type === 'allowed' ? '✅ طيب (مسموح)' : food.type === 'forbidden' ? '❌ خبيث (ممنوع)' : '⚠️ بكميات محدودة'}
                </div>
            </div>
        `).join('');
    }

    searchInput.addEventListener('input', displayFoods);
    filterSelect.addEventListener('change', displayFoods);
    loadFoods();
</script>

<style>
    .loading, .error, .no-results { text-align: center; padding: 40px; font-size: 1.2rem; }
    .error { color: #ff6b6b; }
    .food-card-image img { width: 100%; height: 150px; object-fit: cover; }
</style>

<footer>...</footer>
</body>
</html>
