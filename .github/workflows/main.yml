name: تحديث صور الأطعمة تلقائياً

on:
  push:
    branches: [main, master]
    paths:
      - 'foods-database.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: تحميل الكود
        uses: actions/checkout@v4

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: تثبيت المكتبات
        run: |
          pip install requests pillow tavily-python beautifulsoup4

      - name: تشغيل السكريبت التلقائي
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          python .github/scripts/update_food_images.py

      - name: رفع التغييرات تلقائياً
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/*.webp foods-database.html || true
          git diff --staged --quiet || git commit -m "🤖 تحديث تلقائي للصور [skip ci]"
          git push
