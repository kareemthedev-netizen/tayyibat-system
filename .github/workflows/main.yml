name: جلب صور الأطعمة

on:
  push:
    branches: [main, master]
    paths:
      - 'foods-database.html'
  workflow_dispatch:  # عشان تشغله يدوي لو عايز

permissions:
  contents: write

jobs:
  fetch-images:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1️⃣ تحميل الكود من GitHub
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 2️⃣ إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3️⃣ تثبيت المكتبات المطلوبة
        run: |
          pip install requests pillow tavily-python

      - name: 4️⃣ تشغيل سكريبت جلب الصور
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          python .github/scripts/fetch_food_images.py

      - name: 5️⃣ رفع الصور الجديدة إلى GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/*.webp || true
          git diff --staged --quiet || git commit -m "🤖 تحديث صور الأطعمة [skip ci]"
          git push
