name: تحديث روابط الصور

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update-image-links:
    runs-on: ubuntu-latest
    steps:
      - name: تحميل الكود
        uses: actions/checkout@v4
      
      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: تثبيت المكتبات
        run: |
          pip install requests firebase-admin
          pip install tavily-python
      
      - name: تشغيل سكريبت تحديث الروابط
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          python scripts/sync_foods_to_firebase.py
